services:
  # 1. API backend aplikacji (Wersja Darmowa)
  - type: web
    name: ba-tracker-api
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: OPENSKY_USER
        sync: false
      - key: OPENSKY_PASS
        sync: false
